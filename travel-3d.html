<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐠 Aqua Train World | ชมวริศ (Chomwarit)</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="loading">
        <div style="font-size: 1.2rem; margin-bottom: 10px;">⚡ กำลังเชื่อมต่อระบบ Cyber-Train...</div>
    </div>

    <header class="glass-header">
        <div class="header-content">
            <div class="header-title">
                <span class="oracle-icon">🚄</span>
                <div>
                    <h1>🐠 Aqua Train World</h1>
                    <p>Underwater Journey: Chiang Mai ➔ Phitsanulok</p>
                </div>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <a href="index.html" style="
                    display:inline-flex; align-items:center; gap:6px;
                    background: rgba(34,211,238,0.15);
                    border: 1px solid rgba(34,211,238,0.5);
                    color: #7dd3fc; text-decoration: none;
                    padding: 8px 16px; border-radius: 12px;
                    font-size: 0.85rem; font-weight: 600;
                    backdrop-filter: blur(8px);
                    transition: all 0.2s;
                    cursor: pointer;
                " onmouseover="this.style.background='rgba(34,211,238,0.3)'"
                    onmouseout="this.style.background='rgba(34,211,238,0.15)'">
                    🗺️ แผนที่ 2D
                </a>
            </div>
        </div>
    </header>

    <div class="controls-hint"
        style="position: absolute; bottom: 80px; left: 25px; z-index: 1000; background: rgba(15,23,42,0.85); backdrop-filter: blur(12px); color: #fff; padding: 18px; border-radius: 20px; border: 1px solid rgba(251, 113, 133, 0.4); font-size: 0.9rem; pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <b style="color: #fb7185; display: block; margin-bottom: 5px;">NAVIGATION</b>
        🖱️ Rotate: Left Click<br>
        ↕️ Zoom: Scroll<br>
        🖐️ Pan: Right Click<br>
        🎥 Press 'C' for Cinematic View
    </div>

    <!-- SPEED CONTROLS -->
    <div id="speed-panel" style="
        position: absolute; bottom: 80px; right: 25px; z-index: 1000;
        background: rgba(10,35,66,0.88); backdrop-filter: blur(14px);
        color: #fff; padding: 16px 20px; border-radius: 20px;
        border: 1px solid rgba(34,211,238,0.4);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        font-family: 'Segoe UI', sans-serif;
        display: flex; flex-direction: column; gap: 10px; align-items: center;
    ">
        <b style="color:#22d3ee; font-size:0.85rem; letter-spacing:1px;">🚄 SPEED CONTROL</b>
        <div style="display:flex; gap:10px; align-items:center;">
            <button id="btn-slower" onclick="setSpeed(-1)" style="
                background: rgba(30,64,175,0.7); border: 1px solid #22d3ee;
                color: #fff; border-radius: 12px; padding: 6px 14px;
                font-size: 1.2rem; cursor: pointer; transition: all 0.2s;
            " title="Slower">🐢</button>
            <div id="speed-display" style="
                min-width: 80px; text-align: center;
                background: rgba(0,0,0,0.3); border-radius: 10px;
                padding: 4px 10px; font-size: 0.8rem; color: #7dd3fc;
            ">Speed: ×1</div>
            <button id="btn-faster" onclick="setSpeed(1)" style="
                background: rgba(30,64,175,0.7); border: 1px solid #22d3ee;
                color: #fff; border-radius: 12px; padding: 6px 14px;
                font-size: 1.2rem; cursor: pointer; transition: all 0.2s;
            " title="Faster">🚀</button>
        </div>
        <button id="btn-restart" onclick="restartTrain()" style="
            width: 100%; background: rgba(190,18,60,0.5);
            border: 1px solid rgba(251,113,133,0.6);
            color: #fff; border-radius: 12px; padding: 7px 10px;
            font-size: 0.9rem; cursor: pointer; letter-spacing:0.5px;
            transition: all 0.2s;
        ">🔄 เริ่มใหม่</button>
    </div>

    <script>
        const speedLevels = [0.00005, 0.0001, 0.00015, 0.0003, 0.0006, 0.001];
        const speedLabels = ['×0.3', '×0.7', '×1', '×2', '×4', '×7'];
        let currentSpeedIdx = 2;
        window.trainSpeed = speedLevels[currentSpeedIdx];
        window.trainRestart = false;
        function setSpeed(delta) {
            currentSpeedIdx = Math.max(0, Math.min(speedLevels.length - 1, currentSpeedIdx + delta));
            window.trainSpeed = speedLevels[currentSpeedIdx];
            document.getElementById('speed-display').textContent = 'Speed: ' + speedLabels[currentSpeedIdx];
        }
        function restartTrain() { window.trainRestart = true; }
    </script>

    <div class="footer">สร้างโดย ชมวริศ (Chomwarit) — Strong but Cute Oracle 🌸🚄</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const csvUrl = 'https://raw.githubusercontent.com/Soul-Brews-Studio/two-rivers-oracle/main/%CF%88/lab/github-pages-workshop/travel-cnx-phs.csv';

        // Scene Setup
        const scene = new THREE.Scene();
        // 🌊 UNDERWATER WORLD
        scene.background = new THREE.Color(0x0a2342); // Deep ocean blue
        scene.fog = new THREE.FogExp2(0x0a3d62, 0.012);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 🌊 OCEAN LIGHTING
        const ambientLight = new THREE.AmbientLight(0x0a6b8a, 0.8); // deep teal ambient
        scene.add(ambientLight);

        const sunbeam = new THREE.DirectionalLight(0x60efff, 1.5);
        sunbeam.position.set(100, 200, 100);
        scene.add(sunbeam);

        const pointLight = new THREE.PointLight(0x00c6ff, 3, 60);
        pointLight.position.set(0, 10, 0);
        scene.add(pointLight);

        // 🌊 SEA FLOOR
        const floorGeo = new THREE.PlaneGeometry(1200, 1200, 60, 60);
        const floorMat = new THREE.MeshStandardMaterial({
            color: 0x0d3349, roughness: 1,
            wireframe: false
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -1.5;
        scene.add(floor);

        // 🌊 WATER SURFACE (Semi-transparent)
        const waterGeo = new THREE.PlaneGeometry(1200, 1200);
        const waterMat = new THREE.MeshStandardMaterial({
            color: 0x006994,
            emissive: 0x00364a,
            emissiveIntensity: 0.5,
            transparent: true, opacity: 0.4,
            side: THREE.DoubleSide, roughness: 0, metalness: 0.1
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        water.position.y = 12;
        scene.add(water);

        // 🌊 FLOATING PARTICLES (Bubbles / Plankton)
        const particleCount = 2000;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 1200;
            positions[i * 3 + 1] = Math.random() * 14 - 2;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 1200;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x7dd8f5, size: 0.08, transparent: true, opacity: 0.6 });
        scene.add(new THREE.Points(particleGeo, particleMat));


        // Core Implementation
        async function init() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const records = data.split('\n').slice(1).filter(l => l.trim());

                let minLat = 90, maxLat = -90, minLon = 180, maxLon = -180;
                const pointsData = records.map(line => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const lat = parseFloat(cols[0]), lon = parseFloat(cols[1]);
                    if (isNaN(lat) || isNaN(lon)) return null;
                    minLat = Math.min(minLat, lat); maxLat = Math.max(maxLat, lat);
                    minLon = Math.min(minLon, lon); maxLon = Math.max(maxLon, lon);
                    return { lat, lon };
                }).filter(p => p);

                const mapScale = 600;
                const normalize = (val, min, max) => (val - min) / (max - min) - 0.5;

                // 1. GPS DOWNSAMPLING (Remove noise/jitter)
                const rawWaypoints = pointsData.map(p => new THREE.Vector3(
                    normalize(p.lon, minLon, maxLon) * mapScale,
                    0,
                    normalize(p.lat, minLat, maxLat) * mapScale * 0.8
                ));

                const waypoints = [rawWaypoints[0]];
                const minDistance = 2.0; // Filter points too close to each other
                for (let i = 1; i < rawWaypoints.length; i++) {
                    if (rawWaypoints[i].distanceTo(waypoints[waypoints.length - 1]) > minDistance) {
                        waypoints.push(rawWaypoints[i]);
                    }
                }
                if (waypoints.length < rawWaypoints.length) waypoints.push(rawWaypoints[rawWaypoints.length - 1]);

                // Path Curve
                const curve = new THREE.CatmullRomCurve3(waypoints);

                // 2. SMOOTH NEON RAILS
                const railSpacing = 1.0; // Slightly narrower to prevent overlaps in tight corners
                const createRail = (offset) => {
                    const divisions = 400;
                    const railPoints = [];
                    for (let i = 0; i <= divisions; i++) {
                        const t = i / divisions;
                        const point = curve.getPoint(t);
                        const tangent = curve.getTangent(t).normalize();
                        const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
                        railPoints.push(point.clone().add(normal.multiplyScalar(offset)));
                    }
                    const railCurve = new THREE.CatmullRomCurve3(railPoints);
                    const railGeo = new THREE.TubeGeometry(railCurve, divisions, 0.08, 8, false);
                    const railMat = new THREE.MeshStandardMaterial({
                        color: 0x1e293b,
                        emissive: 0xfb7185,
                        emissiveIntensity: 1.5,
                        metalness: 1,
                        roughness: 0.1
                    });
                    const mesh = new THREE.Mesh(railGeo, railMat);
                    mesh.castShadow = true;
                    return mesh;
                };
                scene.add(createRail(railSpacing / 2));
                scene.add(createRail(-railSpacing / 2));

                // 3. OPTIMIZED SLEEPERS
                const sleeperPoints = 200;
                const sleeperGeo = new THREE.BoxGeometry(railSpacing * 1.8, 0.04, 0.12);
                const sleeperMat = new THREE.MeshStandardMaterial({ color: 0x0d3349, roughness: 1 });
                for (let i = 0; i < sleeperPoints; i++) {
                    const t = i / sleeperPoints;
                    const point = curve.getPoint(t);
                    const tangent = curve.getTangent(t);
                    const sleeper = new THREE.Mesh(sleeperGeo, sleeperMat);
                    sleeper.position.copy(point).y = -0.05;
                    sleeper.rotation.y = Math.atan2(tangent.x, tangent.z) + Math.PI / 2;
                    scene.add(sleeper);
                }


                // 4. 🐠 ANIMATED FISH SCHOOLS
                const fishColors = [0xff7f50, 0xffdd57, 0x40e0d0, 0xff69b4, 0x87ceeb, 0xffa07a, 0x00fa9a];
                const fishList = [];

                const createFish = (pos, color, size) => {
                    const group = new THREE.Group();
                    const fishMat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.4, metalness: 0.2, roughness: 0.6 });

                    // Body
                    const body = new THREE.Mesh(new THREE.SphereGeometry(size, 10, 8), fishMat);
                    body.scale.set(1, 0.55, 1.9);
                    group.add(body);

                    // Tail fin
                    const tailGeo = new THREE.ConeGeometry(size * 0.6, size * 1.2, 4);
                    const tail = new THREE.Mesh(tailGeo, fishMat);
                    tail.rotation.x = -Math.PI / 2;
                    tail.position.z = size * 1.6;
                    group.add(tail);

                    // Top fin
                    const finGeo = new THREE.ConeGeometry(size * 0.2, size * 0.5, 3);
                    const topFin = new THREE.Mesh(finGeo, fishMat);
                    topFin.position.set(0, size * 0.5, 0);
                    group.add(topFin);

                    // Eye
                    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111, emissive: 0xffffff, emissiveIntensity: 0.5 });
                    const eye = new THREE.Mesh(new THREE.SphereGeometry(size * 0.1, 6, 6), eyeMat);
                    eye.position.set(size * 0.4, size * 0.1, size * 0.8);
                    group.add(eye);

                    group.position.copy(pos);
                    return {
                        mesh: group,
                        pathT: Math.random(), // Position along the GPS path
                        sideOffset: (Math.random() > 0.5 ? 1 : -1) * (3 + Math.random() * 20),
                        heightOffset: Math.random() * 8 - 0.5,
                        phase: Math.random() * Math.PI * 2,
                        swimSpeed: 0.3 + Math.random() * 0.5,
                        waveAmp: 1.5 + Math.random() * 3
                    };
                };

                const fishCount = 300;
                for (let i = 0; i < fishCount; i++) {
                    const t = i / fishCount;
                    const point = curve.getPoint(t);
                    const side = i % 2 === 0 ? 1 : -1;
                    const dist = 3 + Math.random() * 20;
                    const tang = curve.getTangent(t).normalize();
                    const norm = new THREE.Vector3(-tang.z, 0, tang.x).normalize();
                    const fishPos = point.clone().add(norm.multiplyScalar(side * dist));
                    fishPos.y = Math.random() * 8 - 0.5;

                    const color = fishColors[Math.floor(Math.random() * fishColors.length)];
                    const size = 0.2 + Math.random() * 0.35;
                    const fish = createFish(fishPos, color, size);
                    scene.add(fish.mesh);
                    fishList.push(fish);
                }

                // 6. 🧜‍♀️ MERMAIDS — ชมวริศ's Underwater Guardians
                const mermaidList = [];

                const createMermaid = (pos) => {
                    const group = new THREE.Group();
                    const skinColor = [0xffddc1, 0xffc8a2, 0xffd0b5][Math.floor(Math.random() * 3)];
                    const hairColor = [0xf472b6, 0xa78bfa, 0xfbbf24, 0x34d399][Math.floor(Math.random() * 4)];
                    const tailColor = [0x22d3ee, 0x34d399, 0x818cf8, 0xfb7185][Math.floor(Math.random() * 4)];
                    const skinMat = new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.7 });
                    const hairMat = new THREE.MeshStandardMaterial({ color: hairColor, emissive: hairColor, emissiveIntensity: 0.4, roughness: 0.8 });
                    const tailMat = new THREE.MeshStandardMaterial({ color: tailColor, emissive: tailColor, emissiveIntensity: 0.5, metalness: 0.4, roughness: 0.3 });

                    // Head
                    const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 12), skinMat);
                    head.position.y = 1.85;
                    group.add(head);

                    // Long Hair (cascading)
                    const hairGeo = new THREE.CylinderGeometry(0.23, 0.12, 0.7, 8);
                    const hair = new THREE.Mesh(hairGeo, hairMat);
                    hair.position.y = 1.55;
                    group.add(hair);
                    const hairTip = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.4, 8), hairMat);
                    hairTip.position.y = 1.1;
                    group.add(hairTip);

                    // Torso
                    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.18, 0.7, 10), skinMat);
                    torso.position.y = 1.25;
                    group.add(torso);

                    // Shell bra accent
                    const shellMat = new THREE.MeshStandardMaterial({ color: hairColor, emissive: hairColor, emissiveIntensity: 0.8 });
                    const shell = new THREE.Mesh(new THREE.SphereGeometry(0.09, 6, 6), shellMat);
                    shell.scale.z = 0.4;
                    shell.position.set(0.1, 1.45, 0.14);
                    group.add(shell);
                    const shell2 = shell.clone();
                    shell2.position.set(-0.1, 1.45, 0.14);
                    group.add(shell2);

                    // Waist / hip join
                    const waist = new THREE.Mesh(new THREE.SphereGeometry(0.18, 10, 10), tailMat);
                    waist.scale.y = 0.5;
                    waist.position.y = 0.88;
                    group.add(waist);

                    // Fish tail (main)
                    const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.08, 1.1, 10), tailMat);
                    tail.position.y = 0.3;
                    group.add(tail);

                    // Tail fin (folded V)
                    const finGeo = new THREE.ConeGeometry(0.35, 0.4, 4);
                    const finLeft = new THREE.Mesh(finGeo, tailMat);
                    finLeft.rotation.z = 0.4;
                    finLeft.position.set(0.22, -0.3, 0);
                    group.add(finLeft);
                    const finRight = new THREE.Mesh(finGeo, tailMat);
                    finRight.rotation.z = -0.4;
                    finRight.position.set(-0.22, -0.3, 0);
                    group.add(finRight);

                    // Arms (one waving)
                    const armMat = skinMat;
                    const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.03, 0.5, 6), armMat);
                    armL.rotation.z = -0.8;
                    armL.position.set(0.35, 1.35, 0);
                    group.add(armL);
                    const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.03, 0.5, 6), armMat);
                    armR.rotation.z = 1.2; // waving up
                    armR.position.set(-0.35, 1.5, 0);
                    group.add(armR);

                    group.position.copy(pos);
                    group.rotation.y = Math.random() * Math.PI * 2;
                    return {
                        mesh: group,
                        pathT: Math.random(),
                        sideOffset: (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 12),
                        heightOffset: 2 + Math.random() * 5,
                        phase: Math.random() * Math.PI * 2,
                        speed: 0.15 + Math.random() * 0.2,
                    };
                };

                for (let i = 0; i < 5; i++) {
                    const t = i / 5;
                    const pt = curve.getPoint(t);
                    const tg = curve.getTangent(t).normalize();
                    const nm = new THREE.Vector3(-tg.z, 0, tg.x).normalize();
                    const side = i % 2 === 0 ? 1 : -1;
                    const mp = pt.clone().add(nm.multiplyScalar(side * (5 + i * 3)));
                    mp.y = 3 + i * 1.5;
                    mermaidList.push(createMermaid(mp));
                    scene.add(mermaidList[mermaidList.length - 1].mesh);
                }

                // 7. 🌊 SEA CREATURES
                const creatureList = [];

                // --- WHALE SHARK (1 gentle giant) ---
                (() => {
                    const g = new THREE.Group();
                    const mat = new THREE.MeshStandardMaterial({ color: 0x1e40af, emissive: 0x1d4ed8, emissiveIntensity: 0.3, roughness: 0.6 });
                    const spotMat = new THREE.MeshStandardMaterial({ color: 0xdbeafe, emissive: 0x93c5fd, emissiveIntensity: 0.2 });
                    // Body
                    const body = new THREE.Mesh(new THREE.SphereGeometry(2, 14, 10), mat);
                    body.scale.set(1, 0.55, 3.5);
                    g.add(body);
                    // Tail
                    const tail = new THREE.Mesh(new THREE.ConeGeometry(1.2, 2.5, 4), mat);
                    tail.rotation.x = -Math.PI / 2; tail.position.z = 8;
                    g.add(tail);
                    // Dorsal fin
                    const dorsal = new THREE.Mesh(new THREE.ConeGeometry(0.6, 2, 4), mat);
                    dorsal.position.set(0, 1.5, -1);
                    g.add(dorsal);
                    // Mouth
                    const mouth = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.3, 0.3), spotMat);
                    mouth.position.set(0, -0.4, -6.5);
                    g.add(mouth);
                    // Spot pattern
                    for (let i = 0; i < 12; i++) {
                        const spot = new THREE.Mesh(new THREE.SphereGeometry(0.18, 6, 6), spotMat);
                        spot.position.set((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 0.8, (Math.random() - 0.5) * 6);
                        g.add(spot);
                    }
                    // Pectoral fins
                    const finGeo = new THREE.ConeGeometry(0.8, 2.5, 4);
                    const finL = new THREE.Mesh(finGeo, mat);
                    finL.rotation.z = -Math.PI / 2.5; finL.position.set(2.2, -0.3, -2);
                    g.add(finL);
                    const finR = finL.clone(); finR.rotation.z = Math.PI / 2.5; finR.position.set(-2.2, -0.3, -2);
                    g.add(finR);
                    const p0 = curve.getPoint(0.1);
                    g.position.set(p0.x + 30, 6, p0.z + 20);
                    scene.add(g);
                    creatureList.push({ mesh: g, type: 'whale', pathT: 0.1, speed: 0.00006, phase: 0, height: 6 });
                })();

                // --- JELLYFISH (8 drifting beauties) ---
                const jfColors = [0xf9a8d4, 0xc4b5fd, 0x67e8f9, 0xfde68a];
                for (let j = 0; j < 8; j++) {
                    const g = new THREE.Group();
                    const jc = jfColors[j % jfColors.length];
                    const jMat = new THREE.MeshStandardMaterial({ color: jc, emissive: jc, emissiveIntensity: 1.5, transparent: true, opacity: 0.55 });
                    // Bell
                    const bell = new THREE.Mesh(new THREE.SphereGeometry(0.5, 12, 12, 0, Math.PI * 2, 0, Math.PI * 0.55), jMat);
                    bell.rotation.x = Math.PI;
                    g.add(bell);
                    // Tentacles
                    for (let t = 0; t < 8; t++) {
                        const ang = (t / 8) * Math.PI * 2;
                        const tens = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.005, 1.2 + Math.random() * 0.8, 4), jMat);
                        tens.position.set(Math.cos(ang) * 0.3, -0.9 - (1.2 + Math.random() * 0.8) / 2, Math.sin(ang) * 0.3);
                        g.add(tens);
                    }
                    const t0 = j / 8;
                    const p0 = curve.getPoint(t0);
                    const tg0 = curve.getTangent(t0).normalize();
                    const nm0 = new THREE.Vector3(-tg0.z, 0, tg0.x).normalize();
                    const side = j % 2 === 0 ? 1 : -1;
                    g.position.copy(p0.clone().add(nm0.multiplyScalar(side * (5 + j * 2))));
                    g.position.y = 4 + j * 1.2;
                    scene.add(g);
                    creatureList.push({ mesh: g, type: 'jf', phase: Math.random() * Math.PI * 2, speed: 0.3 + Math.random() * 0.4, baseY: g.position.y, baseX: g.position.x, baseZ: g.position.z });
                }

                // --- OCTOPUS (3 curious creatures on the sea floor) ---
                for (let o = 0; o < 3; o++) {
                    const g = new THREE.Group();
                    const oc = [0xc084fc, 0xf472b6, 0xff6b6b][o];
                    const oMat = new THREE.MeshStandardMaterial({ color: oc, emissive: oc, emissiveIntensity: 0.4, roughness: 0.8 });
                    // Head/mantle
                    const head = new THREE.Mesh(new THREE.SphereGeometry(0.6, 10, 10), oMat);
                    head.position.y = 0.6;
                    g.add(head);
                    // Eyes
                    const eyeM = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1 });
                    [-0.22, 0.22].forEach(ex => {
                        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), eyeM);
                        eye.position.set(ex, 0.75, 0.5);
                        g.add(eye);
                        const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 6, 6), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                        pupil.position.set(ex, 0.75, 0.59);
                        g.add(pupil);
                    });
                    // 8 tentacles
                    for (let t = 0; t < 8; t++) {
                        const ang = (t / 8) * Math.PI * 2;
                        const tent = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.02, 1.5, 6), oMat);
                        tent.rotation.z = 0.5;
                        tent.position.set(Math.cos(ang) * 0.5, 0, Math.sin(ang) * 0.5);
                        tent.rotation.y = ang;
                        g.add(tent);
                    }
                    const t0 = (o + 0.55) / 3;
                    const p0 = curve.getPoint(t0);
                    const side0 = o % 2 === 0 ? 1 : -1;
                    g.position.set(p0.x + side0 * (8 + o * 5), -0.5, p0.z + o * 3);
                    scene.add(g);
                    creatureList.push({ mesh: g, type: 'oct', phase: Math.random() * Math.PI * 2, speed: 0.4 + Math.random() * 0.3 });
                }

                // --- SEA TURTLE (2 slow graceful gliders) ---
                for (let u = 0; u < 2; u++) {
                    const g = new THREE.Group();
                    const sM = new THREE.MeshStandardMaterial({ color: 0x166534, emissive: 0x14532d, emissiveIntensity: 0.2, roughness: 0.8 });
                    const shellM = new THREE.MeshStandardMaterial({ color: 0x15803d, emissive: 0x4ade80, emissiveIntensity: 0.15, roughness: 0.6 });
                    // Shell
                    const shell = new THREE.Mesh(new THREE.SphereGeometry(0.7, 10, 10), shellM);
                    shell.scale.set(1, 0.55, 1.3);
                    shell.position.y = 0.3;
                    g.add(shell);
                    // Head
                    const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), sM);
                    head.position.set(0, 0.3, 1);
                    g.add(head);
                    // 4 Flippers
                    [[-1, 0.6], [-1, -0.6], [1, 0.6], [1, -0.6]].forEach(([xs, zs]) => {
                        const fl = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.08, 0.4), sM);
                        fl.rotation.y = xs > 0 ? 0.4 : -0.4;
                        fl.position.set(xs * 0.9, 0.1, zs);
                        g.add(fl);
                    });
                    const t0 = (u + 0.2) / 2;
                    const p0 = curve.getPoint(t0);
                    const tg0 = curve.getTangent(t0).normalize();
                    const nm0 = new THREE.Vector3(-tg0.z, 0, tg0.x).normalize();
                    const side = u % 2 === 0 ? 1 : -1;
                    g.position.copy(p0.clone().add(nm0.multiplyScalar(side * 10)));
                    g.position.y = 2 + u * 2;
                    scene.add(g);
                    creatureList.push({ mesh: g, type: 'turtle', pathT: t0, speed: 0.00004, phase: Math.random() * Math.PI * 2, height: g.position.y });
                }

                // 5. HIGH-FIDELITY LOCOMOTIVE (Proper Train Shape 🚄)
                const trainGroup = new THREE.Group();

                // --- MATERIALS ---
                const trainBody = new THREE.MeshStandardMaterial({ color: 0x0d2540, metalness: 0.9, roughness: 0.15 });
                const stripeWhite = new THREE.MeshStandardMaterial({ color: 0xe0f4ff, emissive: 0x90cdf4, emissiveIntensity: 0.3 });
                const accentCyan = new THREE.MeshStandardMaterial({ color: 0x22d3ee, emissive: 0x22d3ee, emissiveIntensity: 1.5 });
                const glassMat = new THREE.MeshStandardMaterial({ color: 0x93c5fd, emissive: 0x3b82f6, emissiveIntensity: 0.8, transparent: true, opacity: 0.7 });
                const darkMetal = new THREE.MeshStandardMaterial({ color: 0x0a1929, metalness: 1, roughness: 0.3 });

                // --- UNDERFRAME (Long flat base, low to track) ---
                const underframe = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.2, 9), darkMetal);
                underframe.position.y = 0.2;
                trainGroup.add(underframe);

                // --- MAIN BODY (Rounded sleek car shell) ---
                const mainBody = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.9, 8), trainBody);
                mainBody.position.y = 0.85;
                trainGroup.add(mainBody);

                // Rounded roof
                const roofGeo = new THREE.CylinderGeometry(0.75, 0.75, 8, 20, 1, false, 0, Math.PI);
                const roof = new THREE.Mesh(roofGeo, trainBody);
                roof.rotation.z = Math.PI / 2;
                roof.rotation.y = Math.PI / 2;
                roof.scale.set(1, 0.7, 1);
                roof.position.y = 1.3;
                trainGroup.add(roof);

                // --- TAPERED NOSE (Aerodynamic wedge front) ---
                const noseGeo = new THREE.CylinderGeometry(0.01, 0.75, 2.5, 8, 1);
                const noseFront = new THREE.Mesh(noseGeo, trainBody);
                noseFront.rotation.x = Math.PI / 2;
                noseFront.position.set(0, 0.85, 5.25);
                trainGroup.add(noseFront);

                // Nose undercut
                const noseCut = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.4, 2), darkMetal);
                noseCut.position.set(0, 0.35, 4.8);
                trainGroup.add(noseCut);

                // --- NOSE STRIPE ---
                const noseStripe = new THREE.Mesh(new THREE.BoxGeometry(1.51, 0.12, 7.5), stripeWhite);
                noseStripe.position.y = 0.7;
                trainGroup.add(noseStripe);

                // --- CYAN ACCENT BAND (Runs length of train) ---
                const accentBand = new THREE.Mesh(new THREE.BoxGeometry(1.52, 0.1, 8), accentCyan);
                accentBand.position.y = 1.05;
                trainGroup.add(accentBand);

                // --- COCKPIT WINDOW (Front cab glass) ---
                const cockpitGeo = new THREE.PlaneGeometry(1.1, 0.6);
                const cockpit = new THREE.Mesh(cockpitGeo, glassMat);
                cockpit.position.set(0, 1.15, 4.26);
                trainGroup.add(cockpit);

                // Side windows (repeating)
                for (let i = -2.5; i <= 2.5; i += 1.8) {
                    const winL = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 0.45), glassMat);
                    winL.rotation.y = Math.PI / 2;
                    winL.position.set(0.76, 1.02, i);
                    trainGroup.add(winL);
                    const winR = winL.clone();
                    winR.rotation.y = -Math.PI / 2;
                    winR.position.set(-0.76, 1.02, i);
                    trainGroup.add(winR);
                }

                // --- BOGIES (Proper train wheel assemblies x3) ---
                const bogiePositions = [-3, 0, 3];
                bogiePositions.forEach(bz => {
                    // Bogie frame
                    const bogieFrame = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.12, 1.8), darkMetal);
                    bogieFrame.position.set(0, 0.05, bz);
                    trainGroup.add(bogieFrame);
                    // Axle × 2
                    [-0.6, 0.6].forEach(az => {
                        const axle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.8, 8), darkMetal);
                        axle.rotation.z = Math.PI / 2;
                        axle.position.set(0, 0.26, bz + az);
                        trainGroup.add(axle);
                        // Wheels × 2 per axle
                        [-0.85, 0.85].forEach(wx => {
                            const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.26, 0.14, 20), darkMetal);
                            wheel.rotation.z = Math.PI / 2;
                            wheel.position.set(wx, 0.26, bz + az);
                            trainGroup.add(wheel);
                            // Wheel rim detail
                            const rim = new THREE.Mesh(new THREE.TorusGeometry(0.24, 0.02, 6, 20), stripeWhite);
                            rim.rotation.y = Math.PI / 2;
                            rim.position.set(wx, 0.26, bz + az);
                            trainGroup.add(rim);
                        });
                    });
                });

                // --- HEADLIGHT (Underwater searchlight glow) ---
                const headlightGlow = new THREE.Mesh(new THREE.CircleGeometry(0.18, 16),
                    new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 8 }));
                headlightGlow.position.set(0, 0.85, 6.5);
                trainGroup.add(headlightGlow);

                const headlight = new THREE.SpotLight(0xffffff, 60, 120, Math.PI / 10, 0.2);
                headlight.position.set(0, 0.85, 6.4);
                const lightTarget = new THREE.Object3D();
                lightTarget.position.set(0, 0.85, 20);
                trainGroup.add(headlight);
                trainGroup.add(lightTarget);
                headlight.target = lightTarget;

                scene.add(trainGroup);

                // 8. 🪷 OXYGEN BUBBLE SYSTEM
                const bubblePool = [];
                const bubbleMat = new THREE.MeshStandardMaterial({
                    color: 0xbae6fd, emissive: 0x7dd3fc,
                    emissiveIntensity: 0.6, transparent: true, opacity: 0.4,
                    roughness: 0, metalness: 0.1
                });
                for (let b = 0; b < 80; b++) {
                    const r = 0.04 + Math.random() * 0.1;
                    const bubble = new THREE.Mesh(new THREE.SphereGeometry(r, 6, 6), bubbleMat.clone());
                    bubble.visible = false;
                    scene.add(bubble);
                    bubblePool.push({
                        mesh: bubble,
                        active: false,
                        vy: 0, vx: 0, vz: 0,
                        life: 0, maxLife: 0
                    });
                }
                let bubbleTimer = 0;

                // Initial setup
                camera.position.set(100, 100, 100);
                controls.target.set(0, 0, 0);

                // Animation State
                let progress = 0;
                let isCinematic = true; // Start cinematic for wow factor
                window.addEventListener('keydown', (e) => {
                    if (e.key.toLowerCase() === 'c') isCinematic = !isCinematic;
                });

                function animate() {
                    requestAnimationFrame(animate);

                    // Slower, smoother scenic pace
                    if (window.trainRestart) {
                        progress = 0;
                        window.trainRestart = false;
                    }
                    progress += (window.trainSpeed !== undefined ? window.trainSpeed : 0.00015);
                    if (progress > 1) progress = 0;

                    const curPos = curve.getPoint(progress % 1);
                    const curTangent = curve.getTangent(progress % 1).normalize();

                    trainGroup.position.copy(curPos);
                    trainGroup.lookAt(curPos.clone().add(curTangent));

                    // 🪷 Spawn Oxygen Bubbles from train body
                    bubbleTimer++;
                    if (bubbleTimer % 3 === 0) { // spawn every 3 frames
                        const freeBubble = bubblePool.find(b => !b.active);
                        if (freeBubble) {
                            // Spawn around the undercarriage / exhaust (back of train)
                            const spawnOffset = new THREE.Vector3(
                                (Math.random() - 0.5) * 1.5,
                                0.2 + Math.random() * 0.5,
                                -3 + (Math.random() - 0.5) * 2
                            ).applyQuaternion(trainGroup.quaternion);
                            freeBubble.mesh.position.copy(curPos.clone().add(spawnOffset));
                            freeBubble.vy = 0.04 + Math.random() * 0.05;
                            freeBubble.vx = (Math.random() - 0.5) * 0.015;
                            freeBubble.vz = (Math.random() - 0.5) * 0.015;
                            freeBubble.life = 0;
                            freeBubble.maxLife = 80 + Math.random() * 60;
                            freeBubble.mesh.material.opacity = 0.4;
                            freeBubble.mesh.visible = true;
                            freeBubble.active = true;
                        }
                    }

                    // Float & fade bubbles
                    bubblePool.forEach(b => {
                        if (!b.active) return;
                        b.life++;
                        b.mesh.position.y += b.vy;
                        b.mesh.position.x += b.vx + Math.sin(b.life * 0.15) * 0.012;
                        b.mesh.position.z += b.vz + Math.cos(b.life * 0.13) * 0.01;
                        // Fade out near surface
                        b.mesh.material.opacity = 0.4 * (1 - b.life / b.maxLife);
                        if (b.life >= b.maxLife || b.mesh.position.y > 14) {
                            b.mesh.visible = false;
                            b.active = false;
                        }
                    });

                    if (isCinematic) {
                        const camOffset = curTangent.clone().multiplyScalar(-18).add(new THREE.Vector3(0, 6, 0));
                        const targetCamPos = curPos.clone().add(camOffset);
                        camera.position.lerp(targetCamPos, 0.02); // Slower, smoother lerp
                        controls.target.lerp(curPos, 0.02);
                    }

                    pointLight.position.copy(curPos).add(new THREE.Vector3(0, 5, 0));
                    controls.update();
                    // 🐠 Animate Fish (Sinusoidal Orbit around path)
                    const time = Date.now() * 0.001;
                    fishList.forEach(f => {
                        f.pathT = (f.pathT + f.swimSpeed * 0.0001) % 1;
                        const pt = curve.getPoint(f.pathT);
                        const tg = curve.getTangent(f.pathT).normalize();
                        const nm = new THREE.Vector3(-tg.z, 0, tg.x).normalize();
                        const sidePos = pt.clone().add(nm.multiplyScalar(f.sideOffset + Math.sin(time * f.swimSpeed * 0.8 + f.phase) * f.waveAmp));
                        sidePos.y = f.heightOffset + Math.sin(time * f.swimSpeed + f.phase) * 1.2;
                        f.mesh.position.copy(sidePos);
                        // Orient fish along swim direction
                        f.mesh.lookAt(pt);
                        // Tail wag
                        f.mesh.rotation.y += Math.sin(time * f.swimSpeed * 4 + f.phase) * 0.06;
                    });

                    // 🧜‍♀️ Animate Mermaids (Graceful Swim)
                    mermaidList.forEach(m => {
                        m.pathT = (m.pathT + m.speed * 0.00008) % 1;
                        const pt = curve.getPoint(m.pathT);
                        const tg = curve.getTangent(m.pathT).normalize();
                        const nm = new THREE.Vector3(-tg.z, 0, tg.x).normalize();
                        const mp = pt.clone().add(nm.multiplyScalar(m.sideOffset + Math.sin(time * m.speed * 0.5 + m.phase) * 3));
                        mp.y = m.heightOffset + Math.sin(time * m.speed + m.phase) * 0.8;
                        m.mesh.position.copy(mp);
                        m.mesh.rotation.y = Math.atan2(nm.x, nm.z) + Math.PI / 2;
                        // Gentle body sway
                        m.mesh.rotation.z = Math.sin(time * m.speed + m.phase) * 0.1;
                        // Face toward train
                        const toTrain = curPos.clone().sub(mp).normalize();
                        m.mesh.lookAt(mp.clone().add(toTrain.multiplyScalar(5)));
                    });

                    // 🌊 Animate Sea Creatures
                    creatureList.forEach(c => {
                        if (c.type === 'whale') {
                            c.pathT = (c.pathT + c.speed) % 1;
                            const pt = curve.getPoint(c.pathT);
                            const tg = curve.getTangent(c.pathT).normalize();
                            c.mesh.position.set(pt.x + 35, c.height + Math.sin(time * 0.2 + c.phase) * 2, pt.z + 20);
                            c.mesh.rotation.y = Math.atan2(-tg.x, -tg.z);
                            c.mesh.rotation.z = Math.sin(time * 0.3 + c.phase) * 0.05;
                        } else if (c.type === 'jf') {
                            // Jellyfish drift upward and bob
                            c.mesh.position.y = c.baseY + Math.sin(time * c.speed + c.phase) * 1.5;
                            c.mesh.position.x = c.baseX + Math.sin(time * c.speed * 0.5 + c.phase) * 2;
                            c.mesh.rotation.y = time * 0.2 + c.phase;
                            // Bell pulse
                            c.mesh.children[0].scale.y = 0.8 + Math.sin(time * c.speed * 3 + c.phase) * 0.2;
                        } else if (c.type === 'oct') {
                            // Tentacles wave gently
                            c.mesh.rotation.y = Math.sin(time * c.speed + c.phase) * 0.3;
                            c.mesh.position.y = -0.5 + Math.abs(Math.sin(time * c.speed * 0.3 + c.phase)) * 0.2;
                        } else if (c.type === 'turtle') {
                            c.pathT = (c.pathT + c.speed) % 1;
                            const pt = curve.getPoint(c.pathT);
                            const tg = curve.getTangent(c.pathT).normalize();
                            const nm = new THREE.Vector3(-tg.z, 0, tg.x).normalize();
                            const side = c.phase > Math.PI ? 1 : -1;
                            c.mesh.position.copy(pt.clone().add(nm.multiplyScalar(side * 12)));
                            c.mesh.position.y = c.height + Math.sin(time * 0.4 + c.phase) * 0.6;
                            c.mesh.rotation.y = Math.atan2(-tg.x, -tg.z);
                        }
                    });

                    renderer.render(scene, camera);
                }

                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 800);
                animate();

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = 'สัมผัสที่ 6 เกิดขัดข้อง...';
                document.getElementById('loading').style.color = '#ef4444';
            }
        }

        init();
    </script>
</body>

</html>
